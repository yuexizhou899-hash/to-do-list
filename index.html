<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Display", "Arial", sans-serif;
        }

        body {
            background-color: #f7f8fa;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .date-time {
            font-size: 36px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 20px;
            color: #6e6e73;
        }

        .add-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 25px;
        }

        .add-card h3 {
            font-size: 20px;
            color: #1d1d1f;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #taskInput {
            padding: 16px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 18px;
            outline: none;
            background: #fafafa;
        }

        #taskInput::placeholder {
            color: #c7c7cc;
        }

        .extra-row {
            display: flex;
            gap: 10px;
        }

        /* 你要的日期时间输入框（原生，好用，英文，AM在上PM在下） */
        #deadline {
            flex: 1;
            padding: 16px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            outline: none;
        }

        #notice {
            flex: 2;
            padding: 16px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: #fafafa;
        }

        #notice::placeholder {
            color: #c7c7cc;
        }

        #addBtn {
            padding: 16px;
            background: #1d1d1f;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #addBtn:hover {
            background: #3a3a3c;
        }

        .task-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 25px;
        }

        .task-column {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clear-btn:hover {
            color: #ff3b30;
        }

        .task-list {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .empty-tip {
            text-align: center;
            color: #c7c7cc;
            font-size: 18px;
            padding: 40px 0;
        }

        .todo-item, .done-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px;
            background: #fafafa;
            border-radius: 10px;
        }

        .done-item {
            background: #f2f2f7;
            text-decoration: line-through;
            color: #8e8e93;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #34c759;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .task-checkbox.checked {
            background: #34c759;
            color: #ffffff;
        }

        .task-body {
            flex: 1;
        }

        .task-text {
            font-size: 16px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .task-notice {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-deadline {
            font-size: 13px;
            color: #ff3b30;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .edit-btn {
            color: #1d1d1f;
        }

        .edit-btn:hover {
            background: #f0f0f0;
        }

        .delete-btn {
            color: #ff3b30;
        }

        .delete-btn:hover {
            background: #ffebee;
        }

        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card, .review-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 16px;
        }

        .stat-content {
            text-align: center;
            color: #c7c7cc;
            font-size: 18px;
            padding: 30px 0;
        }

        #reviewInput {
            width: 100%;
            min-height: 180px;
            border: none;
            outline: none;
            font-size: 16px;
            resize: none;
            background: transparent;
        }

        #reviewInput::placeholder {
            color: #c7c7cc;
        }

        /* 编辑弹窗 */
        .edit-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .edit-modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }

        .edit-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .edit-modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .edit-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
        }

        .edit-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .edit-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel, .btn-save {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-cancel {
            background: #f0f0f0;
        }

        .btn-save {
            background: #000;
            color: #fff;
        }

        @media (max-width: 600px) {
            .task-columns, .bottom-section {
                grid-template-columns: 1fr;
            }
            .date-time {
                font-size: 28px;
            }
            .extra-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="date-time" id="dateTime"></div>
        <div class="subtitle">Manage your daily tasks</div>
    </div>

    <div class="add-card">
        <h3>Add New Task</h3>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            
            <div class="extra-row">
                <!-- 你要的日期时间选择器，原生，好用，AM在上PM在下 -->
                <input type="datetime-local" id="deadline">
                <input type="text" id="notice" placeholder="Notice details">
            </div>

            <button id="addBtn">
                <span>+</span>
                <span>Add</span>
            </button>
        </div>
    </div>

    <div class="task-columns">
        <div class="task-column">
            <div class="column-header">
                <div class="column-title">
                    <span>▤</span>
                    <span>To-Do</span>
                </div>
            </div>
            <div class="task-list" id="todoList">
                <div class="empty-tip">No tasks yet</div>
            </div>
        </div>

        <div class="task-column">
            <div class="column-header">
                <div class="column-title">
                    <span>✅</span>
                    <span>Completed</span>
                </div>
                <button class="clear-btn" id="clearDone">
                    <span>🗑</span>
                    <span>Clear</span>
                </button>
            </div>
            <div class="task-list" id="doneList">
                <div class="empty-tip">No completed tasks</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="stat-card">
            <div class="card-title">
                <span>🗒</span>
                <span>Task Summary</span>
            </div>
            <div class="stat-content" id="statContent">No task records</div>
        </div>

        <div class="review-card">
            <div class="card-title">
                <span>♻️</span>
                <span>Daily Review</span>
            </div>
            <textarea id="reviewInput" placeholder="Write your daily reflection..."></textarea>
        </div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="edit-modal" id="editModal">
    <div class="edit-modal-content">
        <div class="edit-modal-header">
            <div class="edit-modal-title">Edit Task</div>
            <button class="edit-modal-close" id="editModalClose">&times;</button>
        </div>
        <input class="edit-input" id="editTask" placeholder="Task title">
        <input class="edit-input" id="editNotice" placeholder="Notice details">
        <input class="edit-input" id="editDeadline" type="datetime-local">
        <div class="edit-modal-footer">
            <button class="btn-cancel" id="editCancel">Cancel</button>
            <button class="btn-save" id="editSave">Save</button>
        </div>
    </div>
</div>

<script>
    // 顶部时间
    function updateDateTime() {
        const now = new Date();
        const opt = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
        const dateStr = now.toLocaleDateString('en-US', opt);
        const timeStr = now.toLocaleTimeString('en-US');
        document.getElementById('dateTime').innerText = dateStr + ' ' + timeStr;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // 任务
    const taskInput = document.getElementById('taskInput');
    const deadlineInput = document.getElementById('deadline');
    const noticeInput = document.getElementById('notice');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const doneList = document.getElementById('doneList');
    const clearDone = document.getElementById('clearDone');
    const statContent = document.getElementById('statContent');

    const editModal = document.getElementById('editModal');
    const editTask = document.getElementById('editTask');
    const editNotice = document.getElementById('editNotice');
    const editDeadline = document.getElementById('editDeadline');
    const editSave = document.getElementById('editSave');
    const editCancel = document.getElementById('editCancel');
    const editModalClose = document.getElementById('editModalClose');

    let currentEditItem = null;

    // 倒计时文字
    function getCountdown(iso) {
        if (!iso) return "No deadline";
        const end = new Date(iso);
        const now = new Date();
        const diff = end - now;
        if (diff <= 0) return "Expired";
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        return `${h}h ${m}m ${s}s left`;
    }

    // 创建任务
    function createTaskItem(text, notice, deadline) {
        const item = document.createElement('div');
        item.className = 'todo-item';

        const checkbox = document.createElement('div');
        checkbox.className = 'task-checkbox';
        checkbox.onclick = () => {
            item.classList.remove('todo-item');
            item.classList.add('done-item');
            checkbox.classList.add('checked');
            checkbox.innerText = '✓';
            doneList.appendChild(item);
            update();
        };

        const body = document.createElement('div');
        body.className = 'task-body';

        const taskText = document.createElement('div');
        taskText.className = 'task-text';
        taskText.innerText = text;

        const taskNote = document.createElement('div');
        taskNote.className = 'task-notice';
        taskNote.innerText = notice || 'No notice';

        const taskTime = document.createElement('div');
        taskTime.className = 'task-deadline';
        taskTime.innerText = getCountdown(deadline);

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerText = 'Edit';
        editBtn.onclick = () => {
            currentEditItem = item;
            editTask.value = taskText.innerText;
            editNotice.value = taskNote.innerText === 'No notice' ? '' : taskNote.innerText;
            editDeadline.value = deadline || '';
            editModal.style.display = 'flex';
        };

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerText = 'Delete';
        delBtn.onclick = () => { item.remove(); update(); };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        body.appendChild(taskText);
        body.appendChild(taskNote);
        body.appendChild(taskTime);
        body.appendChild(actions);
        item.appendChild(checkbox);
        item.appendChild(body);

        // 倒计时刷新
        if (deadline) {
            const timer = setInterval(() => {
                if (!item.isConnected) clearInterval(timer);
                taskTime.innerText = getCountdown(deadline);
            }, 1000);
        }

        return item;
    }

    // 添加
    addBtn.onclick = () => {
        const t = taskInput.value.trim();
        if (!t) return;
        const task = createTaskItem(t, noticeInput.value, deadlineInput.value);
        todoList.appendChild(task);
        taskInput.value = '';
        noticeInput.value = '';
        deadlineInput.value = '';
        update();
    };

    // 清空已完成
    clearDone.onclick = () => {
        doneList.innerHTML = '<div class="empty-tip">No completed tasks</div>';
        update();
    };

    // 保存编辑
    editSave.onclick = () => {
        if (!currentEditItem) return;
        const t = editTask.value.trim();
        if (!t) return;
        const n = editNotice.value;
        const d = editDeadline.value;

        const taskText = currentEditItem.querySelector('.task-text');
        const taskNote = currentEditItem.querySelector('.task-notice');
        const taskTime = currentEditItem.querySelector('.task-deadline');

        taskText.innerText = t;
        taskNote.innerText = n || 'No notice';
        taskTime.innerText = getCountdown(d);

        // 重启倒计时
        if (d) {
            const timer = setInterval(() => {
                if (!currentEditItem.isConnected) clearInterval(timer);
                taskTime.innerText = getCountdown(d);
            }, 1000);
        }

        editModal.style.display = 'none';
        update();
    };

    // 关闭编辑
    function closeEdit() {
        editModal.style.display = 'none';
        currentEditItem = null;
    }
    editCancel.onclick = closeEdit;
    editModalClose.onclick = closeEdit;
    editModal.onclick = (e) => { if (e.target === editModal) closeEdit(); };

    // 更新空状态与统计
    function update() {
        const todoEmpty = todoList.querySelector('.empty-tip');
        const doneEmpty = doneList.querySelector('.empty-tip');

        if (todoList.children.length === 0 || (todoList.children.length === 1 && todoEmpty)) {
            if (!todoEmpty) {
                const e = document.createElement('div');
                e.className = 'empty-tip';
                e.innerText = 'No tasks yet';
                todoList.appendChild(e);
            }
        } else if (todoEmpty) todoEmpty.remove();

        if (doneList.children.length === 0 || (doneList.children.length === 1 && doneEmpty)) {
            if (!doneEmpty) {
                const e = document.createElement('div');
                e.className = 'empty-tip';
                e.innerText = 'No completed tasks';
                doneList.appendChild(e);
            }
        } else if (doneEmpty) doneEmpty.remove();

        const todoCount = todoList.querySelectorAll('.todo-item').length;
        const doneCount = doneList.querySelectorAll('.done-item').length;
        statContent.innerText = `To-Do: ${todoCount} | Done: ${doneCount}`;
    }

    update();
</script>
</body>
</html>
